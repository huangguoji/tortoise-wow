name: Build Windows

on:
  push:
    branches: [ docker ]
  #   tags:
  #     - 'v*'
  # pull_request:
  #   branches: [ docker ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build:
    name: Windows x64 Release
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # needed for git-describe / revision info

      # ----------------------------------------------------------------
      # ACE — the only external dependency on Windows.
      # MySQL / OpenSSL / zlib are bundled under dep/windows/.
      #
      # ACE 7.x (shipped by recent vcpkg) is incompatible with this codebase:
      # MSVC C2694 fires because ACE_Cleanup::~ACE_Cleanup gained noexcept(false)
      # while ACE_Singleton's generated dtor is implicitly noexcept.
      # Solution: clone vcpkg at the 2023.04.15 release tag which still ships
      # ACE 6.5.x, then cache the installed packages.
      # ----------------------------------------------------------------
      - name: Cache pinned vcpkg ACE packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg_pinned\installed
          key: vcpkg-ace6-x64-windows-2023.04.15

      - name: Checkout pinned vcpkg (ACE 6.5.x era)
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg_pinned `
            --branch 2023.04.15 --depth 1 --quiet
          C:\vcpkg_pinned\bootstrap-vcpkg.bat -disableMetrics

      # pkg-config must exist before vcpkg builds ACE; otherwise the ACE port's
      # vcpkg_fixup_pkgconfig step tries to download MSYS2 packages whose URLs
      # are now 404 on all mirrors (the pinned vcpkg has stale package hashes).
      - name: Install pkg-config (prevents vcpkg MSYS2 download)
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: choco install pkgconfiglite --no-progress -y

      - name: Install ACE 6.5.x via pinned vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & "C:\vcpkg_pinned\vcpkg.exe" install ace:x64-windows

      - name: Bootstrap vcpkg (cache-hit path)
        if: steps.vcpkg-cache.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          if (-not (Test-Path C:\vcpkg_pinned\vcpkg.exe)) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg_pinned `
              --branch 2023.04.15 --depth 1 --quiet
            C:\vcpkg_pinned\bootstrap-vcpkg.bat -disableMetrics
          }

      # Expose ACE_ROOT so CMake FindACE.cmake can locate the library
      - name: Set ACE_ROOT environment variable
        shell: pwsh
        run: |
          echo "ACE_ROOT=C:\vcpkg_pinned\installed\x64-windows" >> $env:GITHUB_ENV

      # ----------------------------------------------------------------
      # Configure
      # ----------------------------------------------------------------
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DUSE_STD_MALLOC=ON `
            -DUSE_SCRIPTS=ON `
            -DUSE_ANTICHEAT=OFF `
            -DUSE_EXTRACTORS=ON `
            -DALLOW_TURTLE_ADDONS=ON `
            -DUSE_DISCORD_BOT=OFF `
            -DUSE_LIBCURL=OFF `
            -DUSE_REALMMERGE=OFF `
            -DACE_ROOT="C:/vcpkg_pinned/installed/x64-windows"

      # ----------------------------------------------------------------
      # Build
      # ----------------------------------------------------------------
      - name: Build
        shell: pwsh
        run: |
          cmake --build build `
            --config ${{ env.BUILD_TYPE }} `
            --parallel $env:NUMBER_OF_PROCESSORS

      # ----------------------------------------------------------------
      # Stage artifact directory
      # ----------------------------------------------------------------
      - name: Stage binaries
        shell: pwsh
        run: |
          $dest = "artifact\bin"
          New-Item -ItemType Directory -Force $dest | Out-Null

          # Core server binaries
          $binRelease = "bin\${{ env.BUILD_TYPE }}"
          if (Test-Path $binRelease) {
            Copy-Item "$binRelease\*.exe" $dest -ErrorAction SilentlyContinue
            Copy-Item "$binRelease\*.dll" $dest -ErrorAction SilentlyContinue
          } else {
            # Some generators put output directly under bin/
            Copy-Item "bin\*.exe" $dest -ErrorAction SilentlyContinue
            Copy-Item "bin\*.dll" $dest -ErrorAction SilentlyContinue
          }

          # Runtime DLLs bundled with the repo (MySQL, OpenSSL, zlib …)
          Copy-Item "dep\windows\lib\x64_release\*.dll" $dest -ErrorAction SilentlyContinue

          # ACE runtime DLL from pinned vcpkg
          Copy-Item "C:\vcpkg_pinned\installed\x64-windows\bin\ACE.dll" $dest -ErrorAction SilentlyContinue

          Write-Host "Staged files:"
          Get-ChildItem $dest | Select-Object Name, Length

      # ----------------------------------------------------------------
      # Upload artifact
      # ----------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurtleWoW-Windows-x64-${{ github.sha }}
          path: artifact/
          if-no-files-found: error
          retention-days: 30

      # ----------------------------------------------------------------
      # Create GitHub Release (only on version tags)
      # ----------------------------------------------------------------
      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path artifact\* `
            -DestinationPath "TurtleWoW-Windows-x64-${{ github.ref_name }}.zip"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TurtleWoW-Windows-x64-${{ github.ref_name }}.zip
          generate_release_notes: true
