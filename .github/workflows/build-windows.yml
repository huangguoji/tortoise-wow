name: Build Windows

on:
  push:
    branches: [ docker ]
    tags:
      - 'v*'
  pull_request:
    branches: [ docker ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build:
    name: Windows x64 Release
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # needed for git-describe / revision info

      # ----------------------------------------------------------------
      # vcpkg: restore or build ACE (the only external dependency on Windows;
      # MySQL / OpenSSL / zlib are bundled under dep/windows/)
      # ----------------------------------------------------------------
      - name: Export vcpkg commit hash for cache key
        shell: pwsh
        run: |
          $hash = (git -C "C:\vcpkg" rev-parse HEAD 2>$null)
          if (-not $hash) { $hash = "builtin" }
          echo "VCPKG_COMMIT=$hash" >> $env:GITHUB_ENV

      - name: Cache vcpkg installed packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-ace-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-ace-

      - name: Install ACE via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & "C:\vcpkg\vcpkg.exe" install ace:x64-windows

      # Expose ACE_ROOT so CMake FindACE.cmake can locate the library
      - name: Set ACE_ROOT environment variable
        shell: pwsh
        run: |
          echo "ACE_ROOT=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV

      # ----------------------------------------------------------------
      # Configure
      # ----------------------------------------------------------------
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DUSE_STD_MALLOC=ON `
            -DUSE_SCRIPTS=ON `
            -DUSE_ANTICHEAT=OFF `
            -DUSE_EXTRACTORS=ON `
            -DALLOW_TURTLE_ADDONS=ON `
            -DUSE_DISCORD_BOT=OFF `
            -DUSE_LIBCURL=OFF `
            -DUSE_REALMMERGE=OFF `
            -DACE_ROOT="C:/vcpkg/installed/x64-windows"

      # ----------------------------------------------------------------
      # Build
      # ----------------------------------------------------------------
      - name: Build
        shell: pwsh
        run: |
          cmake --build build `
            --config ${{ env.BUILD_TYPE }} `
            --parallel $env:NUMBER_OF_PROCESSORS

      # ----------------------------------------------------------------
      # Stage artifact directory
      # ----------------------------------------------------------------
      - name: Stage binaries
        shell: pwsh
        run: |
          $dest = "artifact\bin"
          New-Item -ItemType Directory -Force $dest | Out-Null

          # Core server binaries
          $binRelease = "bin\${{ env.BUILD_TYPE }}"
          if (Test-Path $binRelease) {
            Copy-Item "$binRelease\*.exe" $dest -ErrorAction SilentlyContinue
            Copy-Item "$binRelease\*.dll" $dest -ErrorAction SilentlyContinue
          } else {
            # Some generators put output directly under bin/
            Copy-Item "bin\*.exe" $dest -ErrorAction SilentlyContinue
            Copy-Item "bin\*.dll" $dest -ErrorAction SilentlyContinue
          }

          # Runtime DLLs bundled with the repo (MySQL, OpenSSL, zlib …)
          Copy-Item "dep\windows\lib\x64_release\*.dll" $dest -ErrorAction SilentlyContinue

          # ACE runtime DLL from vcpkg
          Copy-Item "C:\vcpkg\installed\x64-windows\bin\ACE.dll" $dest -ErrorAction SilentlyContinue

          Write-Host "Staged files:"
          Get-ChildItem $dest | Select-Object Name, Length

      # ----------------------------------------------------------------
      # Upload artifact
      # ----------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurtleWoW-Windows-x64-${{ github.sha }}
          path: artifact/
          if-no-files-found: error
          retention-days: 30

      # ----------------------------------------------------------------
      # Create GitHub Release (only on version tags)
      # ----------------------------------------------------------------
      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path artifact\* `
            -DestinationPath "TurtleWoW-Windows-x64-${{ github.ref_name }}.zip"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TurtleWoW-Windows-x64-${{ github.ref_name }}.zip
          generate_release_notes: true
