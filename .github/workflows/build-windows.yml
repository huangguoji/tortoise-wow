name: Build Windows

on:
  push:
    branches: [ docker ]
  #   tags:
  #     - 'v*'
  # pull_request:
  #   branches: [ docker ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Windows x64 Release
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # needed for git-describe / revision info

      # ----------------------------------------------------------------
      # ACE — the only external dependency on Windows.
      # MySQL / OpenSSL / zlib are bundled under dep/windows/.
      #
      # Build ACE 6.5.19 from source to avoid all vcpkg compatibility issues:
      #   - Recent vcpkg ships ACE 7.x  → MSVC C2694 in ACE_Singleton
      #   - Pinned old vcpkg (2023.04.15) → hardcoded MSYS2 package hashes
      #     are now 404 on every mirror; vcpkg_acquire_msys always fires even
      #     when pkg-config is already in PATH.
      # Building from the upstream tag is deterministic and mirror-independent.
      # ----------------------------------------------------------------
      - name: Cache ACE 6.5.19 installation
        id: ace-cache
        uses: actions/cache@v4
        with:
          path: C:\ACE_install
          key: ace-6.5.19-vs2022-x64-v1

      - name: Clone ACE 6.5.19 source
        if: steps.ace-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch "ACE+TAO-6_5_19" `
            https://github.com/DOCGroup/ACE_TAO.git C:\ACE_src --quiet

      - name: Build and install ACE 6.5.19
        if: steps.ace-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S C:\ACE_src -B C:\ACE_build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_INSTALL_PREFIX="C:\ACE_install" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=OFF
          cmake --build C:\ACE_build `
            --config Release `
            --parallel $env:NUMBER_OF_PROCESSORS
          cmake --install C:\ACE_build --config Release

      - name: Set ACE_ROOT environment variable
        shell: pwsh
        run: echo "ACE_ROOT=C:\ACE_install" >> $env:GITHUB_ENV

      # ----------------------------------------------------------------
      # Configure
      # ----------------------------------------------------------------
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DUSE_STD_MALLOC=ON `
            -DUSE_SCRIPTS=ON `
            -DUSE_ANTICHEAT=OFF `
            -DUSE_EXTRACTORS=ON `
            -DALLOW_TURTLE_ADDONS=ON `
            -DUSE_DISCORD_BOT=OFF `
            -DUSE_LIBCURL=OFF `
            -DUSE_REALMMERGE=OFF `
            -DACE_ROOT="C:/ACE_install"

      # ----------------------------------------------------------------
      # Build
      # ----------------------------------------------------------------
      - name: Build
        shell: pwsh
        run: |
          cmake --build build `
            --config ${{ env.BUILD_TYPE }} `
            --parallel $env:NUMBER_OF_PROCESSORS

      # ----------------------------------------------------------------
      # Stage artifact directory
      # ----------------------------------------------------------------
      - name: Stage binaries
        shell: pwsh
        run: |
          $dest = "artifact\bin"
          New-Item -ItemType Directory -Force $dest | Out-Null

          # Core server binaries
          $binRelease = "bin\${{ env.BUILD_TYPE }}"
          if (Test-Path $binRelease) {
            Copy-Item "$binRelease\*.exe" $dest -ErrorAction SilentlyContinue
            Copy-Item "$binRelease\*.dll" $dest -ErrorAction SilentlyContinue
          } else {
            # Some generators put output directly under bin/
            Copy-Item "bin\*.exe" $dest -ErrorAction SilentlyContinue
            Copy-Item "bin\*.dll" $dest -ErrorAction SilentlyContinue
          }

          # Runtime DLLs bundled with the repo (MySQL, OpenSSL, zlib …)
          Copy-Item "dep\windows\lib\x64_release\*.dll" $dest -ErrorAction SilentlyContinue

          # ACE runtime DLL (built from source)
          Copy-Item "C:\ACE_install\bin\ACE.dll" $dest -ErrorAction SilentlyContinue

          Write-Host "Staged files:"
          Get-ChildItem $dest | Select-Object Name, Length

      # ----------------------------------------------------------------
      # Upload artifact
      # ----------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurtleWoW-Windows-x64-${{ github.sha }}
          path: artifact/
          if-no-files-found: error
          retention-days: 30

      # ----------------------------------------------------------------
      # Create GitHub Release (only on version tags)
      # ----------------------------------------------------------------
      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path artifact\* `
            -DestinationPath "TurtleWoW-Windows-x64-${{ github.ref_name }}.zip"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TurtleWoW-Windows-x64-${{ github.ref_name }}.zip
          generate_release_notes: true
