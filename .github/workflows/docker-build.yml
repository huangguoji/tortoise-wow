name: Build and Push Docker Images main

on:
  push:
    branches: [ docker ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CACHIX_CACHE_NAME: "twow"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    outputs:
      realmd-digest: ${{ steps.load.outputs.realmd-digest }}
      mangosd-digest: ${{ steps.load.outputs.mangosd-digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Cachix as pull cache
        run: |
          nix run nixpkgs#cachix -- use tortoise-wow

      - name: Build Docker images with Nix
        run: |
          nix build .#realmd-image-tar --out-link result-realmd-image-tar
          nix build .#mangosd-image-tar --out-link result-mangosd-image-tar
     
     # broken atm - https://github.com/faemwow/tortoise-wow/actions/runs/25479826528/job/74766566399
     # - name: Scan with vulnix
     #   run: |
     #     nix run nixpkgs#vulnix -- --closure $(readlink -f result-realmd-image-tar)
     #     nix run nixpkgs#vulnix -- --closure $(readlink -f result-mangosd-image-tar)

      - name: Push compiled binaries to Cachix
        if: github.event_name != 'pull_request'
        run: |
          nix run nixpkgs#cachix -- push $CACHIX_CACHE_NAME $(nix-store -qR $(nix path-info .#tortoise-wow))
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Push image tarballs to Cachix
        if: github.event_name != 'pull_request'
        run: |
          nix run nixpkgs#cachix -- push $CACHIX_CACHE_NAME $(nix-store -qR $(readlink -f result-realmd-image-tar))
          nix run nixpkgs#cachix -- push $CACHIX_CACHE_NAME $(nix-store -qR $(readlink -f result-mangosd-image-tar))
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Load images into Docker and capture digests
        id: load
        run: |
          docker load < result-realmd-image-tar
          docker load < result-mangosd-image-tar

          echo "realmd-digest=$(docker inspect --format='{{index .Id}}' tortoise-wow-realmd:latest)" >> $GITHUB_OUTPUT
          echo "mangosd-digest=$(docker inspect --format='{{index .Id}}' tortoise-wow-mangosd:latest)" >> $GITHUB_OUTPUT

      - name: Verify images are loaded
        run: |
          docker image inspect tortoise-wow-realmd:latest
          docker image inspect tortoise-wow-mangosd:latest

      - name: Export images as tarballs for artifact sharing
        run: |
          docker save tortoise-wow-realmd:latest | gzip > realmd.tar.gz
          docker save tortoise-wow-mangosd:latest | gzip > mangosd.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-images
          path: |
            realmd.tar.gz
            mangosd.tar.gz
          retention-days: 60

  publish:
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name != 'pull_request'
    timeout-minutes: 30
    permissions:
      packages: write
      id-token: write

    outputs:
      realmd-ref: ${{ steps.push.outputs.realmd-ref }}
      mangosd-ref: ${{ steps.push.outputs.mangosd-ref }}

    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-images

      - name: Load images
        run: |
          docker load < realmd.tar.gz
          docker load < mangosd.tar.gz

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for realmd
        id: meta-realmd
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-realmd
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=sha,prefix=sha-,format=long

      - name: Extract metadata for mangosd
        id: meta-mangosd
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mangosd
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=sha,prefix=sha-,format=long

      - name: Tag and push all images
        id: push
        run: |
          push_image() {
            local local_tag=$1
            local tags=$2
            local output_key=$3
            local digest=""
            for tag in $tags; do
              docker tag $local_tag $tag
              docker push $tag
            done
            digest=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${output_key}:sha-${{ github.sha }} --verbose 2>/dev/null | jq -r '.Descriptor.digest' || docker inspect --format='{{index .RepoDigests 0}}' $local_tag | cut -d@ -f2)
            echo "${output_key}-ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${output_key}@${digest}" >> $GITHUB_OUTPUT
          }
          push_image tortoise-wow-realmd:latest "${{ steps.meta-realmd.outputs.tags }}" realmd
          push_image tortoise-wow-mangosd:latest "${{ steps.meta-mangosd.outputs.tags }}" mangosd

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign all images by digest
        run: |
          cosign sign --yes ${{ steps.push.outputs.realmd-ref }}
          cosign sign --yes ${{ steps.push.outputs.mangosd-ref }}
        env:
          COSIGN_EXPERIMENTAL: true

  scan:
    runs-on: ubuntu-24.04
    needs: publish
    if: github.event_name != 'pull_request'
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Generate SBOM for realmd
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.publish.outputs.realmd-ref }}
          format: 'spdx-json'
          output: 'sbom-realmd.spdx.json'
          exit-code: '0'

      - name: Generate SBOM for mangosd
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.publish.outputs.mangosd-ref }}
          format: 'spdx-json'
          output: 'sbom-mangosd.spdx.json'
          exit-code: '0'

      - name: Run Trivy vulnerability scanner on realmd
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.publish.outputs.realmd-ref }}
          format: 'sarif'
          output: 'trivy-realmd.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner on mangosd
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.publish.outputs.mangosd-ref }}
          format: 'sarif'
          output: 'trivy-mangosd.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results for realmd to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: 'trivy-realmd.sarif'
          category: 'realmd'

      - name: Upload Trivy results for mangosd to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: 'trivy-mangosd.sarif'
          category: 'mangosd'

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sboms
          path: |
            sbom-realmd.spdx.json
            sbom-mangosd.spdx.json
          retention-days: 30

      - name: Attach SBOMs to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            sbom-realmd.spdx.json
            sbom-mangosd.spdx.json
